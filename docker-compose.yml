version: '3.8'

services:
  # ── Base de données PostgreSQL ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: wealth-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       wealthtracker
      POSTGRES_USER:     wealth
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wealthpass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wealth -d wealthtracker"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Application Next.js ──────────────────────────────────────────────────────
  wealth-tracker:
    build: .
    container_name: wealth-tracker
    restart: unless-stopped
    ports:
      - "4000:3000"
    environment:
      DATABASE_URL:          postgresql://wealth:${POSTGRES_PASSWORD:-wealthpass}@postgres:5432/wealthtracker
      NEXTAUTH_SECRET:       ${NEXTAUTH_SECRET:-wealth-tracker-secret-change-me}
      NEXTAUTH_URL:          ${NEXTAUTH_URL:-http://localhost:4000}
      ALPHA_VANTAGE_API_KEY: ${ALPHA_VANTAGE_API_KEY:-}
      COINGECKO_API_KEY:     ${COINGECKO_API_KEY:-}
      NODE_ENV:              production
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  postgres_data:
    driver: local
